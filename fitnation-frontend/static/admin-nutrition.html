<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrition Plans – FitNation Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/admin-nutrition.css" rel="stylesheet">
</head>
<body class="fn-admin-body">
  <div class="fn-admin-shell">
    <aside class="fn-admin-sidebar">
      <div class="fn-admin-brand">
        <svg class="fn-logo" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M6 2v4h2V4h8v2h2V2H6zm0 16h12v2H6v-2zm0-4h12v2H6v-2zm4-8h4v2h-4V6zM6 10v2h12v-2H6z"/>
        </svg>
        <span class="fn-admin-brand-text">FitNation</span>
      </div>
      <nav class="fn-admin-nav" aria-label="Admin navigation">
        <a href="/admin-trainers.html" class="fn-admin-nav-item">
          <span class="fn-admin-nav-icon">🏋️</span>
          <span class="fn-admin-nav-label">Trainers</span>
        </a>
        <a href="/admin-nutrition.html" class="fn-admin-nav-item active">
          <span class="fn-admin-nav-icon fn-admin-nav-icon-apple">🍎</span>
          <span class="fn-admin-nav-label">Nutrition</span>
        </a>
        <button class="fn-admin-nav-item" type="button" aria-current="false">
          <span class="fn-admin-nav-icon">📊</span>
          <span class="fn-admin-nav-label">Overview</span>
        </button>
      </nav>
      <div class="fn-admin-sidebar-footer">
        <button id="logoutBtn" class="fn-admin-logout-btn">Logout</button>
      </div>
    </aside>

    <main class="fn-admin-main">
      <header class="fn-admin-header">
        <div>
          <h1 class="fn-admin-title">Nutrition Plans</h1>
          <p class="fn-admin-subtitle">Manage and monitor dietary programs across the system.</p>
        </div>
        <button class="fn-admin-add-btn" type="button" id="createPlanBtn">
          <span class="fn-admin-add-icon">+</span>
          <span>Create New Plan</span>
        </button>
      </header>

      <section class="fn-admin-section" aria-label="Statistics">
        <div id="statsError" class="fn-alert fn-alert-error" style="display:none;" role="alert"></div>
        <div class="fn-admin-stats-grid fn-nutrition-stats" id="nutritionStats">
          <!-- Stats cards rendered by JS; loading state shown initially -->
          <div id="statsLoading" class="fn-loading-placeholder">
            <div class="fn-spinner" aria-hidden="true"></div>
            <span>Loading statistics…</span>
          </div>
        </div>
      </section>

      <section class="fn-admin-section" aria-label="Master catalog">
        <div class="fn-admin-section-header">
          <div>
            <h2 class="fn-admin-section-title">Master Catalog</h2>
            <p class="fn-admin-section-subtitle">Search and manage nutrition plans.</p>
          </div>
        </div>

        <div class="fn-nutrition-toolbar">
          <div class="fn-search-wrap">
            <span class="fn-search-icon" aria-hidden="true">🔍</span>
            <input type="search" id="planSearch" class="fn-search-input" placeholder="Search plans..." aria-label="Search plans by name">
          </div>
          <button type="button" class="fn-filter-btn" aria-label="Filter plans">⧩</button>
        </div>

        <div id="plansError" class="fn-alert fn-alert-error" style="display:none;" role="alert"></div>
        <div id="plansLoading" class="fn-loading-placeholder" style="display:none;">
          <div class="fn-spinner" aria-hidden="true"></div>
          <span>Loading plans…</span>
        </div>

        <div class="fn-admin-table-wrapper" id="tableWrapper">
          <table class="fn-admin-table fn-nutrition-table" aria-label="Nutrition plans catalog">
            <thead>
              <tr>
                <th scope="col">Plan Name</th>
                <th scope="col">Category</th>
                <th scope="col">Active Clients</th>
                <th scope="col">Avg Rating</th>
                <th scope="col">Status</th>
                <th scope="col"><span class="fn-sr-only">Actions</span></th>
              </tr>
            </thead>
            <tbody id="plansTableBody">
            </tbody>
          </table>
        </div>
        <div class="fn-nutrition-footer">
          <p class="fn-nutrition-summary" id="plansSummary">Showing 0 of 0 plans</p>
          <div class="fn-nutrition-pagination">
            <button type="button" class="fn-page-btn" id="prevPageBtn" aria-label="Previous page" disabled>←</button>
            <button type="button" class="fn-page-btn" id="nextPageBtn" aria-label="Next page" disabled>→</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Create New Plan Modal -->
  <div class="modal fade" id="createPlanModal" tabindex="-1" aria-labelledby="createPlanModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content fn-admin-modal">
        <div class="modal-header fn-admin-modal-header">
          <h2 class="modal-title fs-5" id="createPlanModalLabel">Create New Plan</h2>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body fn-admin-modal-body">
          <div id="createPlanAlert" class="fn-alert fn-alert-error" style="display:none;" role="alert"></div>
          <form id="createPlanForm" novalidate>
            <div class="fn-form-group">
              <label class="fn-label" for="planName">Plan Name <span class="fn-required">*</span></label>
              <input type="text" id="planName" name="planName" class="fn-input" required maxlength="200" placeholder="e.g. Keto Weight Loss">
              <span class="fn-field-error" id="planNameError" aria-live="polite"></span>
            </div>
            <div class="fn-form-group">
              <label class="fn-label" for="category">Category <span class="fn-required">*</span></label>
              <input type="text" id="category" name="category" class="fn-input" required maxlength="100" placeholder="e.g. Weight Loss, Bulking">
              <span class="fn-field-error" id="categoryError" aria-live="polite"></span>
            </div>
            <div class="fn-form-group">
              <label class="fn-label" for="price">Price <span class="fn-required">*</span></label>
              <input type="number" id="price" name="price" class="fn-input" required min="0" step="0.01" placeholder="0.00">
              <span class="fn-field-error" id="priceError" aria-live="polite"></span>
            </div>
            <div class="fn-form-group">
              <label class="fn-label" for="description">Description</label>
              <textarea id="description" name="description" class="fn-input" rows="3" maxlength="1000" placeholder="Optional description"></textarea>
            </div>
            <div class="fn-form-group">
              <label class="fn-label" for="status">Status</label>
              <select id="status" name="status" class="fn-input">
                <option value="ACTIVE">Active</option>
                <option value="DRAFT">Draft</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer fn-admin-modal-footer">
          <button type="button" class="fn-admin-btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="fn-admin-add-btn" id="createPlanSubmitBtn">Create Plan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container for success notification -->
  <div id="toastContainer" class="fn-toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/admin-nutrition.js"></script>
</body>
</html>
