<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – FitNation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="fn-container">
    <svg class="fn-logo" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M6 2v4h2V4h8v2h2V2H6zm0 16h12v2H6v-2zm0-4h12v2H6v-2zm4-8h4v2h-4V6zM6 10v2h12v-2H6z"/>
    </svg>
    <h1 class="fn-title">FitNation</h1>
    <p class="fn-tagline">Modern fitness management.</p>

    <div id="loginAlert" class="fn-alert fn-alert-error" style="display: none;" role="alert"></div>

    <form id="loginForm" class="fn-form">
      <div class="fn-form-group">
        <label class="fn-label" for="email">Email</label>
        <input type="email" id="email" name="email" class="fn-input" required autocomplete="email">
      </div>
      <div class="fn-form-group">
        <label class="fn-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="fn-input" required autocomplete="current-password">
      </div>

      <button type="submit" class="fn-btn-primary" id="loginBtn">Login</button>
    </form>

    <div class="fn-nav">
      <a href="/register" class="fn-nav-btn">Register</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
