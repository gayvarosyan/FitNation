<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainer Management – FitNation Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="fn-admin-body">
  <div class="fn-admin-shell">
    <aside class="fn-admin-sidebar">
      <div class="fn-admin-brand">
        <svg class="fn-logo" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M6 2v4h2V4h8v2h2V2H6zm0 16h12v2H6v-2zm0-4h12v2H6v-2zm4-8h4v2h-4V6zM6 10v2h12v-2H6z"/>
        </svg>
        <span class="fn-admin-brand-text">FitNation</span>
      </div>
      <nav class="fn-admin-nav" aria-label="Admin navigation">
        <button class="fn-admin-nav-item active">
          <span class="fn-admin-nav-icon">🏋️</span>
          <span class="fn-admin-nav-label">Trainers</span>
        </button>
      </nav>
      <div class="fn-admin-sidebar-footer">
        <button id="logoutBtn" class="fn-admin-logout-btn">Logout</button>
      </div>
    </aside>

    <main class="fn-admin-main">
      <header class="fn-admin-header">
        <div>
          <h1 class="fn-admin-title">Trainer Management</h1>
          <p class="fn-admin-subtitle">Onboard and manage your professional coaching staff.</p>
        </div>
        <button class="fn-admin-add-btn" type="button" id="addTrainerBtn">
          <span class="fn-admin-add-icon">+</span>
          <span>Add New Trainer</span>
        </button>
      </header>

      <section class="fn-admin-section">
        <div id="statsError" class="fn-alert fn-alert-error" style="display:none;" role="alert"></div>
        <div class="fn-admin-stats-grid" id="trainerStats">
          <!-- Stats cards will be rendered here -->
        </div>
      </section>

      <section class="fn-admin-section">
        <div class="fn-admin-section-header">
          <div>
            <h2 class="fn-admin-section-title">Staff Directory</h2>
            <p class="fn-admin-section-subtitle">Showing all trainers returned by the API.</p>
          </div>
        </div>

        <div id="trainersError" class="fn-alert fn-alert-error" style="display:none;" role="alert"></div>

        <div class="fn-admin-table-wrapper">
          <table class="fn-admin-table" aria-label="Trainer staff directory">
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Trainer</th>
                <th scope="col">Specialization</th>
                <th scope="col">Contact</th>
                <th scope="col">Status</th>
              </tr>
            </thead>
            <tbody id="trainerTableBody">
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="modal fade" id="addTrainerModal" tabindex="-1" aria-labelledby="addTrainerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content fn-admin-modal">
        <div class="modal-header fn-admin-modal-header">
          <h2 class="modal-title fs-5" id="addTrainerModalLabel">Add New Trainer</h2>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body fn-admin-modal-body">
          <div id="addTrainerAlert" class="fn-alert fn-alert-error" style="display:none;" role="alert"></div>
          <form id="addTrainerForm">
            <div class="row g-2">
              <div class="col-6">
                <label class="fn-label" for="addFirstName">First name</label>
                <input type="text" id="addFirstName" name="firstName" class="fn-input" required maxlength="50">
              </div>
              <div class="col-6">
                <label class="fn-label" for="addLastName">Last name</label>
                <input type="text" id="addLastName" name="lastName" class="fn-input" required maxlength="50">
              </div>
            </div>
            <div class="fn-form-group">
              <label class="fn-label" for="addEmail">Email</label>
              <input type="email" id="addEmail" name="email" class="fn-input" required>
            </div>
            <div class="fn-form-group">
              <label class="fn-label" for="addPassword">Password</label>
              <input type="password" id="addPassword" name="password" class="fn-input" required minlength="8" title="At least 8 characters, one uppercase, one digit, one special character (@$!%*?&._-#+)">
            </div>
            <div class="fn-form-group">
              <label class="fn-label" for="addPhone">Phone</label>
              <input type="tel" id="addPhone" name="phone" class="fn-input" required maxlength="50">
            </div>
            <div class="fn-form-group">
              <label class="fn-label" for="addSpecialization">Specialization</label>
              <input type="text" id="addSpecialization" name="specialization" class="fn-input" maxlength="50" placeholder="e.g. Yoga, HIIT">
            </div>
            <div class="fn-form-group">
              <label class="fn-label" for="addBio">Bio</label>
              <textarea id="addBio" name="bio" class="fn-input" rows="3" maxlength="250" placeholder="Short bio"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer fn-admin-modal-footer">
          <button type="button" class="fn-admin-btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="fn-admin-add-btn" id="addTrainerSubmitBtn">Add Trainer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/admin-trainers.js"></script>
</body>
</html>
