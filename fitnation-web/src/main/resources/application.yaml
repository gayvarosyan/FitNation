spring:
  application:
    name: fitnation-web
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  datasource:
    url: jdbc:postgresql://localhost:5432/fitnation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
jwt:
  secret: fitnation-super-secret-key-must-be-at-least-32-characters-long
  expiration: 3600
  refresh-expiration: 604800
