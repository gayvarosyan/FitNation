spring:
  application:
    name: fitnation-rest-api
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fitnation}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  mail:
    host: smtp.gmail.com
    port: 587
    username: adminfitnation@gmail.com
    password: ukox vxgg dtvi vkhp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:fitnation-super-secret-key-must-be-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:3600}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}

fitnation:
  app:
    login-url: http://localhost:8080/login
  notifications:
    membership-expiry-lead-days: 7
    membership-expiry-cron: "0 15 7 * * ?"
    default-dedup-window: PT1H
    max-notifications-per-recipient-per-hour: 80
    dedup-window-by-event:
      CLASS_FULL: PT24H
      MEMBERSHIP_EXPIRING_SOON: PT24H

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

---
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false