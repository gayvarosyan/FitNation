# H2-backed tests: no Liquibase, no outbound mail. Run with @ActiveProfiles("test").
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
  mail:
    username: test@example.com
  datasource:
    url: jdbc:h2:mem:fitnation;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: false

jwt:
  secret: test-jwt-secret-must-be-at-least-32-chars-long
  expiration: 3600
  refresh-expiration: 604800
